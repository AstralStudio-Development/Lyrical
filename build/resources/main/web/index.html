<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyrical - Voice Chat</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="connecting" class="screen">
            <div class="loader"></div>
            <p>Connecting...</p>
        </div>

        <div id="error" class="screen hidden">
            <h2>Connection Error</h2>
            <p id="error-message"></p>
            <button onclick="location.reload()">Retry</button>
        </div>

        <div id="main" class="screen hidden">
            <header>
                <h1>Lyrical</h1>
                <span id="player-name"></span>
            </header>

            <div id="controls">
                <button id="btn-mute" class="control-btn" title="Mute">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path id="mic-icon" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.06 7.44-7 7.93V20h4v2H8v-2h4v-4.07z"/>
                    </svg>
                </button>
                <button id="btn-deafen" class="control-btn" title="Deafen">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path id="headphone-icon" d="M12 1c-4.97 0-9 4.03-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7c0-4.97-4.03-9-9-9z"/>
                    </svg>
                </button>
            </div>

            <!-- Group Section -->
            <div id="group-section">
                <div id="group-info" class="hidden">
                    <div class="group-header">
                        <span id="group-name"></span>
                        <button id="btn-leave-group" class="btn-small">Leave</button>
                    </div>
                </div>
                <div id="group-actions">
                    <button id="btn-create-group" class="btn-secondary">Create Group</button>
                    <button id="btn-join-group" class="btn-secondary">Join Group</button>
                </div>
            </div>

            <div id="players">
                <h3>Online Players</h3>
                <ul id="player-list"></ul>
            </div>

            <div id="status">
                <span id="connection-status">Connected</span>
            </div>
        </div>

        <!-- Create Group Modal -->
        <div id="modal-create-group" class="modal hidden">
            <div class="modal-content">
                <h3>Create Group</h3>
                <input type="text" id="input-group-name" placeholder="Group name" maxlength="32">
                <input type="password" id="input-group-password" placeholder="Password (optional)">
                <div class="modal-buttons">
                    <button id="btn-cancel-create" class="btn-secondary">Cancel</button>
                    <button id="btn-confirm-create" class="btn-primary">Create</button>
                </div>
            </div>
        </div>

        <!-- Join Group Modal -->
        <div id="modal-join-group" class="modal hidden">
            <div class="modal-content">
                <h3>Join Group</h3>
                <select id="select-group">
                    <option value="">Select a group...</option>
                </select>
                <input type="password" id="input-join-password" placeholder="Password (if required)">
                <div class="modal-buttons">
                    <button id="btn-cancel-join" class="btn-secondary">Cancel</button>
                    <button id="btn-confirm-join" class="btn-primary">Join</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/connection.js"></script>
    <script src="js/audio/microphone.js"></script>
    <script src="js/audio/player.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
